<span class="font-bold text-sm tracking-tight text-[#E8491E]" style="">Moment</span>
</div>

<h1 class="font-type-h1 text-on-surface whitespace-pre-line" style="font-size: 25px; line-height: 1.3;"><b>회원님의 앱 및 웹사이트<br/>활동 정보를 통해 맞춤형 광고를<br/>제공하고자 합니다.</b>
</h1>
</div>

<div class="bg-white p-space-2 rounded-xl border border-color-divider-light shadow-sm">
<p class="font-type-body text-color-text-secondary-light leading-relaxed" style="">
<span class="font-bold text-[#E8491E]" style="">Moment</span>에서는 항상 내 활동에 기반한 광고를 보게 됩니다. 이 설정이 활성화되어 있으면 Moment에서 내 활동과 파트너가 제공한 기타 온라인 활동 및 정보를 결합하여 Moment 내외에서 게재되는 Moment 광고주의 광고를 맞춤 설정할 수 있습니다.
                </p>
</div>

<button class="w-full max-w-xs h-14 bg-color-action-cta text-white font-bold text-base rounded-full shadow-md transition-all duration-200 hover:brightness-110 active:scale-95 flex items-center justify-center gap-2 mx-auto"><span>Next</span><span class="material-symbols-outlined text-[20px]">chevron_right</span></button>
