<body class="bg-color-bg-primary-light min-h-screen flex items-center justify-center overflow-hidden">
<!-- Splash Screen Container (R-001) -->
<main class="relative w-full h-screen flex flex-col items-center justify-center px-space-6">
<!-- Background Artistic Element (Subtle Depth) -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-20">
<div class="w-[80vw] h-[80vw] max-w-2xl max-h-2xl rounded-full bg-gradient-to-br from-orange-100 to-transparent blur-3xl"></div>
</div>
<!-- Identity Cluster -->
<div class="relative z-10 flex flex-col items-center gap-space-4">
<!-- Brand Icon (Derived from TopAppBar leading_icon) -->
<div class="mb-space-2 text-color-action-cta/20">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'wght' 200;">
                    bubble_chart
                </span>
</div>
<!-- Brand Logo -->
<h1 class="font-type-display text-type-display text-color-action-cta tracking-tight italic">
                Moment
            </h1>
<!-- Korean Tagline -->
<p class="font-pretendard text-type-body text-color-text-secondary-light tracking-wide mt-space-2 text-center opacity-80">
                매일의 영감과 평온을 기록하는 순간
            </p>
</div>
<!-- Progress Indicator (Minimalist) -->
<div class="absolute bottom-space-12 z-10 flex flex-col items-center gap-space-4 w-full">
<div class="w-12 h-[2px] bg-color-divider-light overflow-hidden rounded-full">
<div class="h-full bg-color-action-cta/40 w-1/3 rounded-full"></div>
</div>
<!-- Version or Subtle Text -->
<span class="font-pretendard text-type-caption text-color-text-secondary-light/40 uppercase tracking-widest">
                v1.0.4
            </span>
</div>
</main>
<!-- Decorative Texture Layer (Subtle Noise/Grain Simulation) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-50 mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
