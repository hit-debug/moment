<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #fff8f6;
            color: #2C2B27;
            -webkit-font-smoothing: antialiased;
        }
        .scrim-top {
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent);
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #E8491E;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 2px 4px rgba(232, 73, 30, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-type-body antialiased">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 bg-white dark:bg-zinc-950 border-b border-zinc-100 dark:border-zinc-800 shadow-sm dark:shadow-none flex justify-between items-center h-14 px-4">
<button class="flex items-center justify-center w-10 h-10 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-zinc-900 dark:text-zinc-50">arrow_back</span>
</button>
<h1 class="font-manrope text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-50">Moment</h1>
<button class="text-[#E8491E] font-bold px-3 py-1 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors active:scale-95 duration-150">
            Skip
        </button>
</header>
<main class="pt-20 pb-28 px-4 max-w-md mx-auto min-h-screen">
<!-- Main Title & Description -->
<div class="mb-10 animate-fade-in">
<h2 class="font-type-h1 text-type-h1 text-color-text-primary-light mb-2">알림 설정</h2>
<p class="font-type-body text-type-body text-color-text-secondary-light">
                회원님께 영감을 드릴 시간과 횟수를 선택해 주세요.
            </p>
</div>
<!-- Decorative Image Context (Asymmetric Layout element) -->
<div class="w-full h-40 rounded-2xl mb-8 overflow-hidden relative shadow-lg">
<img alt="calm morning light" class="w-full h-full object-cover" data-alt="warm morning sun rays filtering through a minimalist room with soft beige walls and shadows of plants" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0Yi6widTaDcA8kyi5kE3MY4IN5YBhfrKAi0X6DeXySb0B-Y4CBrKNFeipA_pjZyKz2RDeaukOiRttyubjWIyqjRqhUTlGZIClcwXKt6_D5ajQc-bhgEIwP07nAbVNeF_i4ZJ17OnXjGBKsJy05Z_tZf0rHkqNjSPj23OVtCb8bh3e7Q52LqvdJ8Q3E2dHxeOBne5Z5nDrO5RRcQ12YQDKYNNA-qhRPXvwgaZGs7ktFO9DH26gA-QXgBO-qYnajdtRqQyvawnm6ThS"/>
<div class="absolute inset-0 bg-black/10"></div>
<div class="absolute bottom-4 left-4 text-white">
<p class="text-[10px] uppercase tracking-widest font-bold opacity-80">Moment Setting</p>
<p class="font-type-display text-2xl italic">Deep Immersion</p>
</div>
</div>
<!-- Delivery Window Card -->
<div class="bg-color-bg-surface-light rounded-2xl p-space-6 mb-space-4 shadow-sm border border-color-divider-light">
<div class="flex items-center justify-between mb-space-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-color-action-cta">schedule</span>
<span class="font-type-h2 text-type-h2 text-color-text-primary-light">알림 시간대</span>
</div>
<span class="bg-[#FFEBE5] text-color-action-cta px-3 py-1 rounded-full text-[12px] font-bold">활성</span>
</div>
<div class="flex justify-between items-end mb-space-4">
<div class="flex flex-col">
<span class="text-type-caption text-color-text-secondary-light">시작</span>
<span class="text-2xl font-bold text-color-text-primary-light">07:00</span>
</div>
<div class="h-[1px] flex-1 mx-4 bg-color-divider-light mb-4"></div>
<div class="flex flex-col items-end">
<span class="text-type-caption text-color-text-secondary-light">종료</span>
<span class="text-2xl font-bold text-color-text-primary-light">22:00</span>
</div>
</div>
<!-- Custom Range Slider Emulation -->
<div class="relative w-full h-8 flex items-center">
<div class="absolute w-full h-1 bg-color-divider-light rounded-full"></div>
<div class="absolute left-[15%] w-[70%] h-1 bg-color-action-cta rounded-full"></div>
<div class="absolute left-[15%] -translate-x-1/2 w-5 h-5 bg-white border-2 border-color-action-cta rounded-full shadow-md"></div>
<div class="absolute left-[85%] -translate-x-1/2 w-5 h-5 bg-white border-2 border-color-action-cta rounded-full shadow-md"></div>
</div><div class="flex justify-between mt-1 px-1">
<span class="text-type-caption text-color-text-secondary-light w-10">00:00</span>
<span class="text-type-caption text-color-text-secondary-light text-center w-10">12:00</span>
<span class="text-type-caption text-color-text-secondary-light text-right w-10">23:59</span>
</div>
</div>
<!-- Daily Frequency Card -->
<div class="bg-color-bg-surface-light rounded-2xl p-space-6 mb-space-8 shadow-sm border border-color-divider-light">
<div class="flex items-center gap-2 mb-space-6">
<span class="material-symbols-outlined text-color-action-cta">notifications_active</span>
<span class="font-type-h2 text-type-h2 text-color-text-primary-light">알림 횟수</span>
</div>
<div class="flex items-center justify-between mb-space-4">
<button class="w-12 h-12 flex items-center justify-center rounded-xl bg-color-bg-deep-light hover:bg-zinc-200 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="text-center">
<span class="text-4xl font-extrabold text-color-text-primary-light">4</span>
<span class="text-type-body-sm text-color-text-secondary-light ml-1">회</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-xl bg-color-bg-deep-light hover:bg-zinc-200 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<div class="flex gap-2 items-start mt-6 p-3 bg-color-bg-primary-light rounded-xl">
<span class="material-symbols-outlined text-[16px] text-color-status-info mt-0.5">info</span>
<p class="font-type-caption text-color-text-secondary-light leading-relaxed">
                    설정하신 시간대 내에 균등하게 나누어 발송됩니다.
                </p>
</div>
</div>
</main>
<!-- Fixed Primary CTA -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-xl border-t border-color-divider-light">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-color-action-cta text-white font-manrope font-bold text-lg rounded-xl shadow-[0_8px_16px_rgba(232,73,30,0.2)] hover:opacity-90 active:scale-[0.98] transition-all duration-200">
                Done
            </button>
</div>
</div>
</body></html>
